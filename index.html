<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Referans Pendik — Pendik · İstanbul</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/light/style.css">
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/fill/style.css">
<style>
*,*::before,*::after{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;font-family:'Manrope',system-ui,sans-serif;background:#f1ece1;color:#2b3a31;overflow-x:hidden}
::selection{background:#c0883c;color:#fff}

/* ── Nav ────────────────────────────────────────────────────────────────── */
#nav{
  position:fixed;top:0;left:0;right:0;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  padding:18px clamp(20px,5vw,48px);
  color:#f1ece1;background:transparent;
  transition:background .45s,color .45s,box-shadow .45s,padding .45s,backdrop-filter .45s;
}
#nav.scrolled{
  background:rgba(241,236,225,.94);color:#2b3a31;
  box-shadow:0 1px 0 rgba(43,58,49,.07),0 10px 34px rgba(43,58,49,.07);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  padding-top:13px;padding-bottom:13px;
}
.nav-logo{cursor:pointer;display:flex;flex-direction:column;line-height:1}
.nav-logo-name{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;letter-spacing:.03em}
.nav-logo-sub{font-size:9px;letter-spacing:.42em;text-transform:uppercase;opacity:.72;margin-top:5px}
.nav-links{display:flex;gap:clamp(20px,2.6vw,38px);font-size:13px;font-weight:500;letter-spacing:.015em}
.nav-links a{cursor:pointer;color:inherit;text-decoration:none;opacity:.92;transition:opacity .2s}
.nav-links a:hover{opacity:1}
.nav-right{display:flex;align-items:center;gap:clamp(12px,2vw,22px)}
.lang-toggle{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:600;letter-spacing:.08em}
.lang-toggle span{cursor:pointer;transition:opacity .2s}
.lang-sep{opacity:.4;cursor:default!important}
.nav-cta{
  font-family:'Manrope',sans-serif;cursor:pointer;border:none;
  background:#c0883c;color:#fff;font-size:13px;font-weight:600;
  letter-spacing:.04em;padding:11px 22px;border-radius:2px;
  transition:background .3s,transform .2s;
}
.nav-cta:hover{background:#a16f2c}
.nav-cta:active{transform:scale(.97)}
@media(max-width:920px){.nav-links{display:none!important}}

/* ── Hero ───────────────────────────────────────────────────────────────── */
#hero{position:relative;min-height:100dvh;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;left:0;right:0;top:-8%;height:118%;will-change:transform}
.hero-img{width:100%;height:100%;object-fit:cover;display:block}
.hero-overlay{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,
    rgba(15,22,18,.60) 0%,
    rgba(15,22,18,.38) 28%,
    rgba(15,22,18,.52) 55%,
    rgba(15,22,18,.90) 100%
  );
}
@media(max-width:640px){
  .hero-overlay{
    background:linear-gradient(180deg,
      rgba(15,22,18,.68) 0%,
      rgba(15,22,18,.50) 28%,
      rgba(15,22,18,.62) 55%,
      rgba(15,22,18,.94) 100%
    );
  }
}
.hero-content{
  position:relative;z-index:2;width:100%;
  max-width:1280px;margin:0 auto;
  padding:0 clamp(20px,5vw,48px) clamp(70px,11vh,120px);
}
.hero-inner{max-width:780px}
.hero-eyebrow{display:flex;align-items:center;gap:13px;margin-bottom:26px}
.eyebrow-bar{width:36px;height:1px;background:#c0883c;display:block;flex-shrink:0}
.eyebrow-label{letter-spacing:.34em;font-size:12px;text-transform:uppercase;color:#e8c89a;font-weight:600}
h1{
  font-family:'Cormorant Garamond',serif;color:#f6f1e7;
  font-weight:600;font-size:clamp(36px,7.2vw,98px);
  line-height:.98;letter-spacing:-.01em;margin:0 0 28px;
  text-shadow:0 2px 18px rgba(10,18,12,.45);
}
@media(max-width:480px){h1{font-size:32px;margin-bottom:22px}}
.h1-line2{display:block;font-style:italic;font-weight:500;color:#ecdcc2}
.hero-stats{display:flex;flex-wrap:wrap;gap:clamp(26px,4vw,60px);margin-bottom:38px}
.hero-stat{display:flex;flex-direction:column;gap:5px}
.stat-num{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(26px,3.4vw,44px);font-weight:600;color:#e8c89a;line-height:1;
  text-shadow:0 1px 10px rgba(10,18,12,.4);
}
.stat-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(246,241,231,.78);font-weight:600}
.hero-ctas{display:flex;flex-wrap:wrap;gap:14px}
.btn-primary{
  font-family:'Manrope',sans-serif;cursor:pointer;border:none;
  background:#c0883c;color:#fff;font-size:14px;font-weight:600;
  letter-spacing:.03em;padding:16px 32px;border-radius:2px;
  display:flex;align-items:center;gap:10px;
  transition:background .3s,transform .2s;
}
.btn-primary:hover{background:#a16f2c}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{
  font-family:'Manrope',sans-serif;cursor:pointer;
  background:transparent;color:#f6f1e7;
  border:1px solid rgba(246,241,231,.5);
  font-size:14px;font-weight:600;letter-spacing:.03em;
  padding:16px 30px;border-radius:2px;
  transition:background .3s,border-color .3s;
}
.btn-ghost:hover{background:rgba(246,241,231,.12);border-color:rgba(246,241,231,.8)}
.hero-scroll-hint{
  position:absolute;bottom:26px;left:50%;transform:translateX(-50%);
  z-index:2;display:flex;flex-direction:column;align-items:center;gap:8px;
  color:rgba(246,241,231,.7);
}
.hero-scroll-hint span{font-size:10px;letter-spacing:.28em;text-transform:uppercase}
@keyframes rpBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
.hero-scroll-hint i{font-size:18px;animation:rpBounce 1.9s ease-in-out infinite}

/* ── Reveal ─────────────────────────────────────────────────────────────── */
[data-reveal]{
  opacity:0;transform:translateY(30px);
  transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1);
}
[data-reveal].visible{opacity:1;transform:none}
.hero-inner[data-reveal]{transition-duration:1s}

/* ── Shared section ─────────────────────────────────────────────────────── */
.section-wrap{max-width:1280px;margin:0 auto;padding:0 clamp(20px,5vw,48px)}
.section-head{max-width:680px}
.section-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.eyebrow-bar-sm{width:34px;height:1px;background:#c0883c;display:block;flex-shrink:0}
.eyebrow-text-sm{letter-spacing:.3em;font-size:11.5px;text-transform:uppercase;font-weight:600}
h2{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(34px,4.6vw,60px);line-height:1.02;
  letter-spacing:-.01em;margin:0 0 18px;
}
.section-sub{margin:0;font-size:16px;line-height:1.65;color:#5d6b60;max-width:60ch}

/* ── Highlights ─────────────────────────────────────────────────────────── */
#highlights{background:#f1ece1;padding:clamp(80px,12vh,140px) 0}
.hl-head{margin-bottom:clamp(48px,7vh,80px)}
.hl-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(270px,1fr));gap:clamp(18px,2.5vw,32px)}
.hl-card{
  background:#faf6ee;border:1px solid rgba(43,58,49,.1);
  border-radius:4px;overflow:hidden;display:flex;flex-direction:column;
}
.hl-card-img{height:210px;overflow:hidden;flex-shrink:0}
.hl-card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.hl-card:hover .hl-card-img img{transform:scale(1.04)}
.hl-card-body{padding:clamp(26px,2.8vw,40px) clamp(22px,2.4vw,34px);display:flex;flex-direction:column;gap:16px}
.hl-card i{font-size:42px;color:#c0883c}
.hl-card h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:28px;margin:0;color:#2b3a31}
.hl-card p{margin:0;font-size:14.5px;line-height:1.6;color:#5d6b60}

/* ── Apartments ─────────────────────────────────────────────────────────── */
#apartments{background:#e7dfce;padding:clamp(80px,12vh,140px) 0}
.apt-head{
  display:flex;flex-wrap:wrap;align-items:flex-end;
  justify-content:space-between;gap:24px;
  margin-bottom:clamp(40px,6vh,64px);
}
.apt-head-text{max-width:620px}
.apt-nav-btns{display:flex;gap:10px}
.apt-btn{
  cursor:pointer;width:50px;height:50px;border-radius:50%;
  border:1px solid rgba(43,58,49,.28);background:transparent;
  color:#2b3a31;display:flex;align-items:center;justify-content:center;
  font-size:18px;transition:background .3s,color .3s;
}
.apt-btn:hover{background:#2b3a31;color:#f1ece1}
.apt-scroller{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:18px;
  padding:6px clamp(20px,5vw,48px) 26px;
  max-width:1280px;margin:0 auto;
}
@media(max-width:1100px){.apt-scroller{grid-template-columns:repeat(3,1fr)}}
@media(max-width:700px){.apt-scroller{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.apt-scroller{grid-template-columns:1fr}}
.apt-card{
  background:#faf6ee;border:1px solid rgba(43,58,49,.1);
  border-radius:4px;overflow:hidden;display:flex;flex-direction:column;
}
.apt-img{height:228px;border-bottom:1px solid rgba(43,58,49,.08);overflow:hidden;flex-shrink:0}
.apt-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.apt-card:hover .apt-img img{transform:scale(1.04)}
.apt-body{padding:24px 22px 26px;display:flex;flex-direction:column;gap:11px;flex:1}
.apt-type-row{display:flex;align-items:baseline;justify-content:space-between}
.apt-type{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:600;color:#2b3a31;line-height:1}
.apt-size{font-size:13px;letter-spacing:.03em;color:#a16f2c;font-weight:700}
.apt-desc{margin:0;font-size:13.5px;line-height:1.55;color:#5d6b60;flex:1}
.apt-cta{
  margin-top:6px;font-family:'Manrope',sans-serif;cursor:pointer;
  background:transparent;border:1px solid rgba(43,58,49,.25);
  color:#2b3a31;font-size:13px;font-weight:600;letter-spacing:.02em;
  padding:12px 16px;border-radius:2px;
  display:flex;align-items:center;justify-content:space-between;
  transition:background .3s,color .3s,border-color .3s;width:100%;
}
.apt-cta:hover{background:#2b3a31;color:#f1ece1;border-color:#2b3a31}
.apt-note{font-size:11.5px;color:#8a9388;letter-spacing:.02em;margin:0;padding:14px 0 0}

/* ── Location ───────────────────────────────────────────────────────────── */
#location{background:#2b3a31;color:#f1ece1;padding:clamp(80px,12vh,140px) 0}
#location h2{color:#f6f1e7}
#location .section-sub{color:rgba(241,236,225,.72)}
.loc-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(330px,1fr));
  gap:clamp(28px,4vw,56px);align-items:start;
}
.map-slot{
  position:relative;border-radius:4px;overflow:hidden;
  min-height:420px;border:1px solid rgba(241,236,225,.16);
  background:linear-gradient(155deg,#1a2e22 0%,#243b2d 40%,#2b3a31 70%,#1f2b24 100%);
  display:flex;align-items:center;justify-content:center;
}
.map-placeholder{
  display:flex;flex-direction:column;align-items:center;gap:14px;
  color:rgba(241,236,225,.22);text-align:center;
}
.map-placeholder i{font-size:52px}
.map-placeholder span{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:500}
.map-badge{
  position:absolute;left:18px;bottom:18px;
  background:rgba(43,58,49,.82);backdrop-filter:blur(6px);
  padding:11px 16px;border-radius:2px;
  display:flex;align-items:center;gap:9px;
}
.map-badge i{font-size:17px;color:#e8c89a}
.map-badge span{font-size:12.5px;letter-spacing:.04em;font-weight:600}
.loc-tabs{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:22px}
.loc-tab{
  font-family:'Manrope',sans-serif;cursor:pointer;font-size:13px;
  font-weight:600;letter-spacing:.03em;padding:10px 18px;border-radius:2px;
  transition:background .3s,color .3s,border-color .3s;
  background:transparent;color:rgba(241,236,225,.8);
  border:1px solid rgba(241,236,225,.25);
}
.loc-tab.active{background:#c0883c;color:#fff;border-color:#c0883c}
.loc-item{
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:15px 2px;border-bottom:1px solid rgba(241,236,225,.13);
}
.loc-item-name{font-size:14.5px;color:#f1ece1;letter-spacing:.01em}
.loc-item-dist{font-size:13px;font-weight:600;letter-spacing:.04em;color:#e8c89a;white-space:nowrap}

/* ── Lifestyle ──────────────────────────────────────────────────────────── */
#lifestyle{background:#f1ece1;padding:clamp(80px,12vh,140px) 0}
.life-gallery{
  display:grid;grid-template-columns:repeat(4,1fr);
  grid-auto-rows:210px;grid-auto-flow:row dense;gap:14px;
}
.life-item{position:relative;overflow:hidden;border-radius:3px}
.life-item-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease}
.life-item:hover .life-item-img{transform:scale(1.04)}
.life-overlay{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(31,43,36,0) 45%,rgba(31,43,36,.7) 100%);
}
.life-caption{
  position:absolute;left:18px;bottom:16px;
  color:#f6f1e7;font-family:'Cormorant Garamond',serif;
  font-size:21px;font-weight:500;letter-spacing:.01em;
  pointer-events:none;text-shadow:0 1px 8px rgba(0,0,0,.3);
}
@media(max-width:760px){
  .life-gallery{grid-template-columns:repeat(2,1fr)!important}
  .life-item{grid-column:auto!important;grid-row:auto!important;min-height:220px}
}
@media(max-width:480px){.life-gallery{grid-template-columns:1fr!important}}

/* ── Hero ticker ────────────────────────────────────────────────────────── */
.hero-ticker{
  overflow:hidden;margin-bottom:32px;
  -webkit-mask-image:linear-gradient(90deg,transparent 0%,#000 12%,#000 88%,transparent 100%);
  mask-image:linear-gradient(90deg,transparent 0%,#000 12%,#000 88%,transparent 100%);
}
.hero-ticker-track{
  display:flex;gap:0;white-space:nowrap;
  animation:rpTicker 28s linear infinite;
  width:max-content;
}
.hero-ticker-track:hover{animation-play-state:paused}
.hero-ticker-item{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(16px,1.9vw,22px);color:rgba(232,200,154,.82);
  letter-spacing:.01em;padding:0 40px;
}
.hero-ticker-sep{color:rgba(192,136,60,.5);padding:0;font-style:normal}
@keyframes rpTicker{from{transform:translateX(0)}to{transform:translateX(-50%)}}

/* ── Architecture ───────────────────────────────────────────────────────── */
#architecture{background:#e7dfce;padding:clamp(80px,12vh,140px) 0}
.arch-grid{
  display:grid;grid-template-columns:1fr 1fr;
  gap:clamp(40px,6vw,80px);align-items:center;
}
@media(max-width:760px){.arch-grid{grid-template-columns:1fr}}
.arch-img{border-radius:4px;overflow:hidden;aspect-ratio:4/3}
.arch-img img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Poetry ─────────────────────────────────────────────────────────────── */
#poetry{background:#2b3a31;padding:clamp(70px,10vh,110px) 0;text-align:center}
.poetry-label{
  font-size:11px;letter-spacing:.38em;text-transform:uppercase;
  color:#e8c89a;font-weight:600;margin-bottom:clamp(28px,4vh,44px);
  display:block;
}
.poetry-lines{
  list-style:none;padding:0;margin:0;
  display:flex;flex-direction:column;gap:clamp(8px,1.2vh,14px);
}
.poetry-lines li{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:clamp(20px,3vw,36px);font-weight:400;
  color:rgba(246,241,231,.88);line-height:1.15;
  transition:color .3s;
}
.poetry-lines li:hover{color:#e8c89a}

/* ── Feature Banner ─────────────────────────────────────────────────────── */
#feature-banner{width:100%;height:clamp(260px,38vh,480px);overflow:hidden;position:relative}
#feature-banner img{width:100%;height:100%;object-fit:cover;display:block}

/* ── Contact ────────────────────────────────────────────────────────────── */
#contact{background:#1f2b24;color:#f1ece1;padding:clamp(80px,12vh,140px) 0}
#contact h2{color:#f6f1e7;margin:0 0 20px}
.contact-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
  gap:clamp(36px,5vw,72px);align-items:start;
}
.contact-eyebrow{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.contact-eyebrow-text{letter-spacing:.3em;font-size:11.5px;text-transform:uppercase;color:#e8c89a;font-weight:600}
.contact-sub{margin:0 0 38px;font-size:16px;line-height:1.65;color:rgba(241,236,225,.74);max-width:46ch}
.contact-links{display:flex;flex-direction:column;gap:20px}
.contact-link{display:flex;align-items:center;gap:15px;color:inherit;text-decoration:none}
.contact-icon{
  width:46px;height:46px;border-radius:50%;flex-shrink:0;
  border:1px solid rgba(241,236,225,.22);
  display:flex;align-items:center;justify-content:center;
}
.contact-icon i{font-size:19px;color:#e8c89a}
.contact-icon .wa{font-size:20px}
.contact-link-text{display:flex;flex-direction:column;gap:2px}
.contact-link-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:rgba(241,236,225,.55)}
.contact-link-val{font-size:15px;font-weight:600}

/* ── Form ───────────────────────────────────────────────────────────────── */
.form-box{background:#faf6ee;border-radius:5px;padding:clamp(28px,3vw,40px)}
.form-group{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.form-label{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:#2b3a31}
.form-label .hint{text-transform:none;letter-spacing:0;color:#8a9388;font-weight:400}
.form-input,.form-select,.form-textarea{
  font-family:'Manrope',sans-serif;font-size:15px;
  padding:13px 15px;border:1px solid rgba(43,58,49,.22);
  border-radius:2px;background:#fff;color:#2b3a31;
  outline:none;transition:border-color .3s;width:100%;
}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#c0883c}
.form-select{cursor:pointer}
.form-textarea{resize:vertical}
.form-error{font-size:12.5px;color:#b3502f;margin-top:2px}
.form-consent-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:24px;cursor:pointer}
.form-consent-row input{margin-top:2px;width:16px;height:16px;accent-color:#c0883c;cursor:pointer;flex-shrink:0}
.form-consent-text{font-size:12.5px;line-height:1.5;color:#5d6b60}
.form-consent-error{font-size:12.5px;color:#b3502f;margin:-14px 0 18px}
.btn-submit{
  width:100%;font-family:'Manrope',sans-serif;cursor:pointer;border:none;
  background:#c0883c;color:#fff;font-size:15px;font-weight:600;
  letter-spacing:.03em;padding:16px;border-radius:2px;
  display:flex;align-items:center;justify-content:center;gap:10px;
  transition:background .3s,transform .2s;
}
.btn-submit:hover{background:#a16f2c}
.btn-submit:active{transform:scale(.99)}
.form-success{
  background:#faf6ee;border-radius:5px;
  padding:clamp(40px,5vw,60px) clamp(28px,3vw,40px);
  text-align:center;display:flex;flex-direction:column;align-items:center;gap:18px;
}
.form-success i{font-size:58px;color:#3f7a4f}
.form-success h3{font-family:'Cormorant Garamond',serif;font-weight:600;font-size:32px;margin:0;color:#2b3a31}
.form-success p{margin:0;font-size:15px;line-height:1.6;color:#5d6b60;max-width:38ch}
.btn-again{
  font-family:'Manrope',sans-serif;cursor:pointer;background:transparent;
  border:1px solid rgba(43,58,49,.25);color:#2b3a31;font-size:13px;
  font-weight:600;padding:11px 22px;border-radius:2px;
  transition:background .3s,color .3s;
}
.btn-again:hover{background:#2b3a31;color:#f1ece1}

/* ── Footer ─────────────────────────────────────────────────────────────── */
footer{background:#1a241e;color:rgba(241,236,225,.7);padding:48px 0}
.footer-top{

/* ── Lightbox ───────────────────────────────────────────────────────────── */
#lightbox{
  position:fixed;inset:0;z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#lightbox.open{opacity:1;pointer-events:all}
#lb-overlay{position:absolute;inset:0;background:rgba(13,20,16,.93);cursor:zoom-out}
#lb-img-wrap{position:relative;z-index:1;display:flex;align-items:center;justify-content:center}
#lb-img{
  max-width:90vw;max-height:86vh;object-fit:contain;display:block;
  border-radius:3px;box-shadow:0 28px 90px rgba(0,0,0,.75);
  opacity:1;transform:scale(1);
  transition:opacity .18s ease,transform .18s ease;
}
#lb-img.fading{opacity:0;transform:scale(.96)}
#lb-close{
  position:fixed;top:18px;right:22px;z-index:202;
  width:44px;height:44px;border-radius:50%;border:1px solid rgba(241,236,225,.25);
  background:rgba(241,236,225,.12);color:#f1ece1;font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s;
}
#lb-close:hover{background:rgba(241,236,225,.26)}
#lb-prev,#lb-next{
  position:fixed;top:50%;transform:translateY(-50%);z-index:202;
  width:50px;height:50px;border-radius:50%;border:1px solid rgba(241,236,225,.25);
  background:rgba(241,236,225,.12);color:#f1ece1;font-size:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,opacity .2s;
}
#lb-prev{left:18px}
#lb-next{right:18px}
#lb-prev:hover,#lb-next:hover{background:rgba(241,236,225,.26)}
#lb-prev[disabled],#lb-next[disabled]{opacity:.25;cursor:default;pointer-events:none}
#lb-counter{
  position:fixed;top:22px;left:50%;transform:translateX(-50%);z-index:202;
  color:rgba(241,236,225,.55);font-size:12px;letter-spacing:.12em;
  font-family:'Manrope',sans-serif;
}
#lb-caption{
  position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:202;

// ── Helpers ───────────────────────────────────────────────────────────────

function t(key) {
  return key.split('.').reduce((o, k) => (o && o[k] !== undefined) ? o[k] : '', I18N[lang]);

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setText(id, val) {
  const el = document.getElementById(id);
  if (el && typeof val === 'string') el.textContent = val;
}

// ── Form submit ───────────────────────────────────────────────────────────

function onSubmit() {
  const f = t('form');
  formErrors = {};
  if (!formState.name.trim()) formErrors.name = f.errName;
  if ((formState.phone || '').replace(/\D/g,'').length < 10) formErrors.phone = f.errPhone;
  if (!formState.consent) formErrors.consent = f.errConsent;
  if (Object.keys(formErrors).length) { renderForm(); return; }
  submitted = true;
  renderForm();
}

function resetForm() {
  submitted = false;
  formState = {name:'',phone:'',type:'',message:'',consent:false};
  formErrors = {};
  renderForm();
}

// ── Scroll helpers ────────────────────────────────────────────────────────

function scrollToTop() { window.scrollTo({top:0,behavior:'smooth'}); }

function scrollToSection(id) {
  const el = document.getElementById(id);
  if (!el) return;
  window.scrollTo({top: el.getBoundingClientRect().top + window.scrollY - 68, behavior:'smooth'});
}

function aptScroll(dir) {
  const el = document.getElementById('apt-scroller');
  if (el) el.scrollBy({left: dir * 330, behavior:'smooth'});
}

// ── Nav + parallax scroll ─────────────────────────────────────────────────

let _scrolled = null;
let _ticking = false;

function applyScroll() {
  const y = window.scrollY || 0;
  const nav = document.getElementById('nav');
  const solid = y > 120;
  if (solid !== _scrolled) {
    _scrolled = solid;
    nav.classList.toggle('scrolled', solid);
  }
  const bg = document.getElementById('hero-bg');
  if (bg && y < window.innerHeight * 1.2) {
    bg.style.transform = `translate3d(0,${y * 0.22}px,0) scale(1.06)`;
  }
}

window.addEventListener('scroll', () => {
  if (_ticking) return;
  _ticking = true;
  requestAnimationFrame(() => { _ticking = false; applyScroll(); });
}, {passive:true});

// ── Reveal animation ──────────────────────────────────────────────────────

function observeAll(els) {
  if (!observer) return;
  const arr = Array.from(els);
  arr.forEach((el, i) => {
    const sibs = Array.from(el.parentElement?.children || []).filter(c => c.hasAttribute('data-reveal'));
    el.style.transitionDelay = (Math.max(0, sibs.indexOf(el)) * 80) + 'ms';
    observer.observe(el);
  });
}

function initReveal() {
  if (!('IntersectionObserver' in window)) {
    document.querySelectorAll('[data-reveal]').forEach(el => el.classList.add('visible'));
    return;
  }
  observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, {threshold:0.12, rootMargin:'0px 0px -7% 0px'});
  observeAll(document.querySelectorAll('[data-reveal]'));
}

// ── Lightbox ──────────────────────────────────────────────────────────────

let lbImages = [];
let lbIndex = 0;

function openLightbox(images, index) {
  lbImages = images;
  lbIndex = index;
  _lbShow(false);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbNav(dir) {
  const next = lbIndex + dir;
  if (next < 0 || next >= lbImages.length) return;
  const imgEl = document.getElementById('lb-img');
  imgEl.classList.add('fading');
  setTimeout(() => {
    lbIndex = next;
    _lbShow(true);
    imgEl.classList.remove('fading');
  }, 180);
}

function _lbShow(skipFade) {
  const item = lbImages[lbIndex];
  const imgEl = document.getElementById('lb-img');
  imgEl.src = item.src;
  imgEl.alt = item.caption || '';
  document.getElementById('lb-caption').textContent = item.caption || '';
  document.getElementById('lb-counter').textContent =
    lbImages.length > 1 ? `${lbIndex + 1} / ${lbImages.length}` : '';
  document.getElementById('lb-prev').disabled = lbIndex === 0;
  document.getElementById('lb-next').disabled = lbIndex === lbImages.length - 1;
}

function openGalleryLightbox(index) {
  openLightbox(LIFE.map(item => ({
    src: `project/uploads/${item.img}`,
    caption: item[lang]
  })), index);
}

function openAptLightbox(index) {
  openLightbox(APTS.map(a => ({
    src: `project/uploads/${APT_IMGS[a.type]}`,
    caption: `${a.type} — ${a.size}`
  })), index);
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
});

function init() {

  renderPoetry();
  renderLifeGallery();
  renderFooterLinks();
  renderForm();
  initReveal();
  applyScroll();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
